name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

concurrency:
  group: node-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build And Test (${{ matrix.os }})
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux
            runner: ubuntu-latest
            artifact_name: memovyn-linux-x86_64
            artifact_path: release/memovyn
          - os: macos
            runner: macos-latest
            artifact_name: memovyn-macos-x86_64
            artifact_path: release/memovyn
          - os: windows
            runner: windows-latest
            artifact_name: memovyn-windows-x86_64.exe
            artifact_path: release/memovyn.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install

      - name: Typecheck
        run: npm run typecheck

      - name: Run tests
        run: npm test

      - name: Build bundle
        run: npm run build

      - name: Build single executable
        run: npm run package:sea

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error
