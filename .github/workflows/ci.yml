name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

concurrency:
  group: node20-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build, Test, and Package (${{ matrix.os }})
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux
            runner: ubuntu-latest
            artifact_name: memovyn-linux-x86_64
            artifact_path: release/memovyn-linux-x86_64
          - os: macos
            runner: macos-latest
            artifact_name: memovyn-macos-x86_64
            artifact_path: release/memovyn-darwin-x86_64
          - os: windows
            runner: windows-latest
            artifact_name: memovyn-windows-x86_64
            artifact_path: release/memovyn-win32-x86_64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Restore npm cache
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-${{ runner.os }}-node20-${{ hashFiles('package.json') }}
          restore-keys: |
            npm-${{ runner.os }}-node20-

      - name: Show runtime versions
        run: |
          node -v
          npm -v

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Typecheck
        run: npm run typecheck

      - name: Run tests
        run: npm test

      - name: Build project
        run: npm run build

      - name: Prune dev dependencies
        run: npm prune --omit=dev

      - name: Build release bundle
        run: npm run package:bundle

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error
